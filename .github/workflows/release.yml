name: Release
concurrency: release-${{ github.ref }}

on:
    workflow_dispatch:
    schedule:
        - cron: "0 0 * * 5"

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write

jobs:
    release:
        uses: Forsakringskassan/.github/.github/workflows/npm-release.yaml@b984754c3b33ad8569008d51388359bd1556f7c1 # main
        with:
            app-id: ${{ vars.RELEASE_APP_ID }}
        secrets:
            app-key: ${{ secrets.RELEASE_APP_KEY }}
