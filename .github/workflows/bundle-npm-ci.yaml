name: Bundle NPM CI

on: [workflow_dispatch, workflow_call, push, pull_request]

permissions:
    contents: read

jobs:
    call-workflow:
        uses: Forsakringskassan/.github/.github/workflows/bundle-npm-ci.yaml@a8d2864a5e15a8bdb1d28bfbe3c1222c4e4ca344 # main
    cypress-e2e:
        name: Cypress E2E Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js 22.x
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run build
            - name: Cypress E2E tests
              uses: cypress-io/github-action@v7
              with:
                  summary-title: "E2E tests"
                  start: npm start
                  build: npx cypress info
                  browser: chrome
                  wait-on: "http://127.0.0.1:8080"
                  quiet: true
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              if: always()
              with:
                  name: cypress-e2e-screenshots
                  path: cypress/screenshots
                  if-no-files-found: ignore
